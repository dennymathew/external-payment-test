name: ExternalPurchasePOC
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.1"
packages:
  ExternalPurchaseKit:
    path: ExternalPurchaseKit
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.26.1
targets:
  ExternalPurchasePOC:
    type: application
    platform: iOS
    sources:
      - path: ExternalPurchasePOC
    dependencies:
      - package: ExternalPurchaseKit
        product: ExternalPurchaseKit
      - package: ComposableArchitecture
        product: ComposableArchitecture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.externalpurchasepoc
        PRODUCT_NAME: ExternalPurchasePOC
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ExternalPurchasePOC/Info.plist
schemes:
  ExternalPurchasePOC:
    build:
      targets:
        ExternalPurchasePOC: all
    run:
      config: Debug
